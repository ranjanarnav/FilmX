<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}FilmX{% endblock %}</title>
  <style>
    /* Base reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, "Helvetica Neue", Arial, sans-serif;
      color: #e6e6e6;
      background: radial-gradient(1200px 600px at 50% 10%, rgba(255,0,0,0.08), transparent 60%),
                  radial-gradient(800px 400px at 80% 70%, rgba(255,0,0,0.08), transparent 60%),
                  linear-gradient(180deg, #0b0b0f 0%, #0a0a10 40%, #07070c 100%);
      font-size: 16px;
    }

    a { text-decoration: none; color: inherit; }

    /* --- Nav Bar --- */
    .nav {
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: #0b0b0f;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      color: #fff;
      font-size: 34px;
      text-decoration: none;
      letter-spacing: 0.25px;
    }

    .brand svg { width: 60px; height: 60px; fill: #ff2a2a; }

    .top-links { display: flex; align-items: center; gap: 20px; }

    .btn-small {
      background: #1a1a22;
      border: 1px solid #2b2b36;
      color: #d0d0d8;
      padding: 10px 14px;
      border-radius: 7px;
      font-size: 14px;
    }

    .btn-small:hover { border-color: #444457; color: #fff; }

    /* --- Footer --- */
    .footer {
      border-top: 1px solid #1b1b22;
      color: #7f7f8c;
      text-align: center;
      padding: 16px;
      font-size: 13px;
      background: #0b0b0f;
    }

    /* Container for main content */
    main { padding-top: 20px; }
  </style>
</head>
<body>

<!-- Nav Bar -->
<header class="nav" role="navigation">
  <a href="{% url 'home' %}" class="brand" aria-label="FilmX Home">
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <rect x="3" y="3" width="18" height="18" rx="3"></rect>
      <rect x="7.5" y="7.5" width="3.5" height="3.5" fill="#0b0b0f"></rect>
      <rect x="13" y="7.5" width="3.5" height="3.5" fill="#0b0b0f"></rect>
      <rect x="7.5" y="13" width="9" height="3.5" fill="#0b0b0f"></rect>
    </svg>
    FilmX
  </a>
  <nav class="top-links">
    <a class="btn-small" href="{% url 'browse' %}">Browse</a>
  </nav>
</header>

<!-- Main content -->
<main>
  {% block content %}
  <!-- Page-specific content goes here -->
  {% endblock %}
</main>

<!-- Footer -->
<footer class="footer">
  © 2024 FilmX. All rights reserved.
</footer>

</body>
</html>
